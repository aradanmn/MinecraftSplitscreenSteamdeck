# =============================================================================
# Minecraft Splitscreen Mods Configuration
# =============================================================================
# Each non-blank, non-comment line defines one mod.
#
# Format:
#   required|Mod Name|platform|mod_id
#   optional|Mod Name|platform|mod_id
#
#   required  — always installed; gates Minecraft version selection
#   optional  — offered to the user during interactive install
#   platform  — modrinth or curseforge
#   mod_id    — the project ID on that platform
#
# Required mods are also used by version_management.sh to determine which
# Minecraft versions are compatible. Change them only if you know the new
# mod supports the same splitscreen.properties contract.
#
# To add a mod: append a line below. To remove an optional mod: delete or
# comment out its line. The installer will reflect the change on next run.
# =============================================================================

# ── Required ─────────────────────────────────────────────────────────────────
# Controlify: controller input (replaces old Controllable / CurseForge 317269)
required|Controlify|modrinth|DOUdJVEm
# Splitscreen Support: reads splitscreen.properties, partitions screen per slot
required|Splitscreen Support|modrinth|yJgqfSDR

# ── Optional: performance ─────────────────────────────────────────────────────
# Sodium is the rendering backend; the extras below require Sodium to be selected.
optional|Sodium|modrinth|AANobbMI
optional|Sodium Options API|modrinth|Es5v4eyq
# Reese's Sodium Options — replaces Sodium's built-in settings screen
optional|Reese's Sodium Options|modrinth|Bh37bMuy
# Sodium Extra — extra render toggles (weather, animations, etc.)
optional|Sodium Extra|modrinth|PtjYWJkn
# Sodium Extras — unrelated to Sodium Extra; adds moon phases + speed display
optional|Sodium Extras|modrinth|vqqx0QiE
optional|Sodium Dynamic Lights|modrinth|PxQSWIcD

# ── Optional: quality-of-life ─────────────────────────────────────────────────
optional|Better Name Visibility|modrinth|pSfNeCCY
optional|Full Brightness Toggle|modrinth|aEK1KhsC
optional|In-Game Account Switcher|modrinth|cudtvDnd
optional|Just Zoom|modrinth|iAiqcykM
optional|Mod Menu|modrinth|mOgUt4GM
optional|Old Combat Mod|modrinth|dZ1APLkO

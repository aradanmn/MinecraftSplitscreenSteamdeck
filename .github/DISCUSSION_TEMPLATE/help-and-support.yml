title: "[Help] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reaching out! To help you faster, please fill in as much detail as possible.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Steam Deck (SteamOS / Game Mode)
        - Steam Deck (Desktop Mode)
        - Bazzite
        - Other Linux (please describe below)
    validations:
      required: true

  - type: dropdown
    id: launcher_type
    attributes:
      label: PrismLauncher install type
      options:
        - Flatpak
        - AppImage
        - Not sure
    validations:
      required: true

  - type: input
    id: minecraft_version
    attributes:
      label: Minecraft version
      placeholder: "e.g. 1.21.4"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What's happening?
      description: Describe the problem clearly. What did you expect vs. what actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run installer via curl …
        2. Select mods …
        3. Launch splitscreen …
        4. Error occurs at …

  - type: textarea
    id: logs
    attributes:
      label: Installer or launcher logs
      description: |
        Paste relevant log output here. Logs are saved to:
        `~/.local/share/MinecraftSplitscreen/logs/`
      render: shell

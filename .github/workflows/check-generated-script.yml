name: Check generated launcher fixture

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-fixture:
    name: Validate fixture script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install BATS
        run: sudo apt-get install -y bats

      - name: Run fixture checks
        run: bash tests/check-fixture.sh

      - name: Run dynamic mode assertions
        run: bash tests/test_dynamic_mode.sh

      - name: Run API mocking tests
        run: bash tests/test_api_mocking.sh

      - name: Run utility function tests
        run: bats tests/test_utilities.bats

      - name: Run path configuration tests
        run: bats tests/test_path_configuration.bats

      - name: Run instance creation tests
        run: bats tests/test_instance_creation.bats

      - name: Run integration test
        run: bash tests/test_integration.sh
